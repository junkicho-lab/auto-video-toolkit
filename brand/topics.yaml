main_category: "교육"
sub_topics:
  - 수업 전략 및 학생 지도
  - 교사의 성장과 자기 관리
  - 학부모 및 동료 교사 소통
  - 교육 본질과 철학 탐구
  - 에듀테크 활용 팁
content_pillars:
  - name: "티처 혜인의 수업 솔루션"
    description: "교실에서 즉시 적용 가능한 실용적인 수업 전략, 학생 지도 노하우, 참여형 학습 기법 등을 전문적인 관점에서 제시하고, 교사들의 수업 고민에 대한 명확한 해결책을 제공합니다."
    frequency: "biweekly"
    example_titles:
      - "산만한 교실, 이 3가지 원칙으로 '기적'을 만들다"
      - "학생 마음 사로잡는 질문 스킬! 수업 몰입도 200% 높이기"
      - "AI 시대, 우리 아이들에게 필요한 진짜 교육은?"
  - name: "교사 성장 & 멘탈 케어"
    description: "교사의 번아웃 예방, 스트레스 관리, 건강한 학부모 및 동료 교사 소통법, 그리고 끊임없이 성장하는 교사를 위한 자기 계발 전략을 다룹니다. 교직 생활의 만족도를 높이는 데 필요한 심리적, 관계적 지원을 제공합니다."
    frequency: "biweekly"
    example_titles:
      - "번아웃 교사 탈출법! 나를 지키는 자기관리 루틴"
      - "학부모 민원, 현명하게 대처하는 '티처 혜인'의 솔루션"
      - "교사의 성장통, 멘토링에서 답을 찾다"
  - name: "교육 트렌드 & 미래 비전"
    description: "급변하는 교육 정책, 최신 에듀테크 동향, 국내외 성공적인 교육 사례를 분석하고, 미래 교육이 나아가야 할 방향을 탐색합니다. 변화에 선제적으로 대응하고 싶은 교사들에게 통찰력과 영감을 제공합니다."
    frequency: "monthly"
    example_titles:
      - "2024 교육과정 개편, 교사가 알아야 할 핵심 3가지"
      - "미래 교실, 에듀테크 이렇게 활용하세요! (실전편)"
      - "해외 교육 성공 사례: 우리 교실에 적용 가능한 아이디어"
  - name: "티처 혜인의 성장 노트 (Shorts)"
    description: "교사들이 일상에서 마주하는 소소한 고민부터 수업 중 발생하는 돌발 상황까지, 짧고 간결하게 핵심 팁과 지혜로운 해결 방안을 제시하는 숏폼 콘텐츠입니다. 즉각적인 공감과 실용적인 정보를 전달합니다."
    frequency: "weekly"
    example_titles:
      - "학생 갈등, 1분 만에 해결하는 대화법"
      - "수업 준비 시간 1/2로 줄이는 '비밀' 도구"
      - "칭찬으로 아이를 변화시키는 '마법'의 3단계"
evergreen_topics:
  - 학생 참여형 수업 기법: 언제나 학생들의 흥미와 집중도를 높이는 것은 교사의 주요 과제입니다.
  - 문제 행동 학생 지도: 교실에서 지속적으로 발생하는 다양한 학생 행동 문제에 대한 해결책은 항상 필요합니다.
  - 효율적인 학급 운영 노하우: 신규 교사부터 경력 교사까지 학급 관리는 기본이자 핵심 역량입니다.
  - 교사의 자기관리 및 번아웃 예방: 교직 스트레스가 높은 만큼, 교사 스스로를 돌보는 방법은 상시 관심사입니다.
  - 학부모와의 긍정적인 소통 전략: 학교와 가정의 연계는 교육 성과에 필수적이며, 소통 이슈는 늘 존재합니다.
  - 교사의 교육 철학과 가치관 정립: 교육의 본질에 대한 고민은 교직 생활 전반에 걸쳐 이루어지는 심층적인 주제입니다.
trending_keywords:
  - 늘봄학교: 최근 교육 정책의 핵심으로, 관련 정보 수요가 높습니다.
  - AI 교육: 인공지능 기술의 교육 현장 도입 및 활용 방안에 대한 관심이 증대되고 있습니다.
  - 디지털 교과서: 교육부의 디지털 전환 정책에 따른 현장 교사들의 정보 필요성이 큽니다.
  - 교권 보호: 교권 침해 사례 증가로 사회적 이슈화, 관련 법규 및 대응 방안 검색이 활발합니다.
  - 학교폭력 예방: 사회적 민감도가 높은 주제로, 예방 및 대처 방안에 대한 지속적인 관심이 있습니다.
  - 생성형 AI (교사): ChatGPT 등 생성형 AI를 수업에 활용하는 구체적인 방법론을 탐색하는 추세입니다.
  - 인성 교육: 최근 강조되는 교육 방향으로, 실제 적용 방안에 대한 고민이 많습니다.
  - 에듀테크 활용: 다양한 교육 기술 도구들의 실질적인 활용법에 대한 관심이 높습니다.
  - 메타버스 교육: 새로운 기술을 활용한 교육 콘텐츠 및 수업 방식에 대한 탐구가 이루어지고 있습니다.
  - 자율 연수 (교사): 교사들의 전문성 신장을 위한 자율적인 연수 기회 및 방법 검색이 활발합니다.
  - 교육과정 개정: 주기적으로 발생하는 교육과정 변화에 대한 정보 습득이 필수적입니다.
