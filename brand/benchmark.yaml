channels:
  - name: "쌤TV"
    url: "https://www.youtube.com/@ssamtv"
    subscribers: "25만명"
    avg_views: "3만-5만회"
    content_style: "교사 대상 전문 강연 및 인터뷰 형식. 실제 교실 사례 기반 솔루션 제시. 롱폼 위주 (10-20분). 차분하고 전문적인 진행."
    success_patterns:
      - "현직 교사 및 교육 전문가 섭외를 통한 정보의 신뢰성 및 전문성 확보."
      - "구체적인 문제 상황(예: '문제 행동 학생 지도')을 제시하고 단계별 해결책을 명확히 제공."
      - "다양한 교사들의 경험과 관점을 인터뷰 형식으로 공유하여 시청자의 공감대 및 학습 효과 증대."
    thumbnail_style: "인물(강사 또는 인터뷰이) 얼굴 클로즈업 + 핵심 키워드(2-3단어) + 고대비 색상으로 가시성 강조."
    title_formula: "[문제 제시] + [해결책/핵심 키워드] + [대상] (예: '수업 시간 갈등, 이렇게 해결하세요! | 쌤TV')"
    upload_frequency: "주 1회 (주로 수요일 또는 금요일)"
  - name: "초등교사TV"
    url: "https://www.youtube.com/@choteacher"
    subscribers: "10만명"
    avg_views: "1만-2만회"
    content_style: "초등교사 대상 실용적 수업 팁, 학급 운영 노하우. 브이로그 및 튜토리얼 혼합. 짧은 롱폼 (5-10분) 및 숏폼 콘텐츠."
    success_patterns:
      - "교사가 직접 경험한 사례 위주로 현실감과 공감대를 형성하며, '나도 할 수 있다'는 동기 부여."
      - "실제 수업 자료, 양식 등을 공유하여 정보의 실용성을 극대화하고 시청자의 즉각적인 적용을 유도."
      - "친근하고 솔직한 소통 방식으로 시청자와의 유대감을 형성하고 커뮤니티 활성화."
    thumbnail_style: "실제 교실 배경 또는 교사 얼굴 + 밝고 명랑한 색감 + 핵심 문구(구체적 팁 명시, 예: '3가지 마법')."
    title_formula: "[구체적 팁] + [효과] + [대상] (예: '초등학생 수업 집중력 높이는 3가지 마법! | 초티비')"
    upload_frequency: "주 2회 (주로 화요일, 목요일)"
  - name: "자유학년교실"
    url: "https://www.youtube.com/@freeyearclass"
    subscribers: "5만명"
    avg_views: "5천-1만회"
    content_style: "특정 교육 과정(자유학년제)에 초점을 맞춘 심층 분석, 수업 아이디어 공유. 전문 강연 및 실습 시연. 롱폼 위주 (15-25분)."
    success_patterns:
      - "특정 교육 제도에 대한 심층적이고 전문적인 정보 제공으로 니치 시장 공략 및 전문가 이미지 구축."
      - "이론과 실제를 연결하는 구체적인 수업 자료 및 활동 예시를 제시하여 교사의 이해도와 적용 가능성 높임."
      - "교사들의 궁금증을 해소하는 Q&A 형식 콘텐츠를 통해 시청자 참여 유도 및 신뢰 강화."
    thumbnail_style: "교육 관련 이미지/도표 + 굵은 고딕체 글씨로 제목 강조 + 차분하고 신뢰감을 주는 색상."
    title_formula: "[교육 제도/주제] + [심층 분석/방법] + [핵심] (예: '자유학년제, 성공적인 수업 설계를 위한 5단계 전략')"
    upload_frequency: "격주 1회 (월 2회)"

checklist:
  thumbnail:
    - "메인 인물(티처 혜인)의 얼굴이 화면의 40% 이상 차지하며 공감 또는 확신하는 표정 클로즈업"
    - "배경과 인물/텍스트의 명확한 대비를 위한 고채도 또는 보색 대비 색상 사용 (웜 옐로우, 소프트 그린 계열 강조)"
    - "핵심 메시지를 3단어 이내로 간결하게 전달하는 텍스트 삽입 (예: '수업 고민', '성장 비법')"
    - "노트, 펜, 노트북 등 '티처 혜인'의 시그니처 요소를 활용하여 채널 아이덴티티 강화"
  title:
    - "교사들의 구체적인 고민이나 문제 상황을 질문 형태로 제시하여 호기심 유발 (예: '수업 집중력, 이대로 괜찮을까요?')"
    - "숫자를 활용하여 정보의 명확성과 신뢰성 강조 (예: '3가지 원칙', '5단계 전략', '200% 높이기')"
    - "해결책 또는 긍정적 효과를 명시하여 시청자의 필요 충족 (예: '기적을 만들다', '고민 해결')"
    - "타겟 시청자가 누구인지 명확히 언급하여 관련성 높이기 (예: '선생님들을 위한', '교실에서 바로 쓰는')"
  first_3_seconds:
    - "영상 시작과 동시에 교사들이 흔히 겪는 구체적인 문제 상황이나 질문을 짧은 자막과 함께 제시"
    - "시각적으로 강렬하거나 공감 가는 이미지/짧은 영상 클립을 활용하여 시선을 즉각적으로 사로잡기"
    - "'안녕하세요, 선생님들의 든든한 동반자 티처 혜인입니다!'와 같은 시그니처 멘트로 친근함과 전문성 동시에 전달"
  retention:
    - "30초마다 화면 전환 (그래픽, 인포그래픽, 시연 화면, 혜인 캐릭터 애니메이션 등) 또는 카메라 앵글/제스처 변화"
    - "다음 핵심 내용에 대한 짧은 예고 또는 '잠깐! 티처 혜인의 팁' 코너 삽입으로 시청자의 기대감 유지"
    - "핵심 정보나 해결책을 간결하게 요약한 정리 자막을 주기적으로 노출하여 정보 습득 용이하게 함"
    - "관련된 다른 선생님들의 공감 가는 경험담이나 Q&A 클립을 삽입하여 상호작용 및 몰입도 증진"

insights:
  common_patterns:
    - "현실적인 문제 제시와 구체적인 해결책: 교사들이 겪는 실제 어려움을 명확히 인지하고, 즉시 적용 가능한 실용적인 솔루션을 제공하는 것이 공통적인 성공 요인이다."
    - "전문성과 신뢰성 확보: 현직 교사, 교육 전문가, 혹은 실제 교육 현장 사례를 통해 콘텐츠의 전문성을 높이고 시청자의 신뢰를 얻는다."
    - "공감대 형성 및 소통: 시청자의 고충에 공감하고 지지하는 따뜻한 태도를 통해 유대감을 형성하며, 댓글이나 Q&A를 통해 적극적으로 소통한다."
    - "명확하고 효과적인 썸네일/제목: 시청자가 채널의 내용을 한눈에 파악할 수 있도록 간결하고 핵심 키워드 위주의 썸네일과 제목을 사용하여 클릭을 유도한다."
  differentiation:
    - "'티처 혜인'이라는 일관된 페르소나와 따뜻한 스토리텔링: 다수의 전문가나 사례 나열이 아닌, '티처 혜인' 캐릭터가 공감과 전문성을 바탕으로 모든 콘텐츠를 주도하며 친밀하고 일관된 브랜드 경험을 제공한다."
    - "교육의 본질과 철학 탐구 강조: 실용적인 팁을 넘어 '교육의 본질'에 대한 심층적인 고민과 사려 깊은 통찰을 제공하여, 교사들의 장기적인 성장과 가치관 정립에 기여하는 차별점을 가진다."
    - "시각적 아이덴티티 강화: 부드러운 라인아트 스타일과 웜톤 컬러 팔레트, '티처 혜인' 캐릭터의 고유한 시그니처 요소를 통해 독자적이고 편안한 브랜드 이미지를 구축한다."
    - "협력적이고 긍정적인 커뮤니티 조성: '공감하고, 사려 깊으며, 협력적인' 페르소나를 바탕으로 시청자를 단순한 소비자가 아닌 '함께 성장하는 동반자'로 여기며 긍정적인 소통과 커뮤니티 형성에 집중한다."
  avoid:
    - "단순한 교육 뉴스 요약 또는 정책 전달: '티처 혜인'은 단순한 정보 전달자가 아닌, 전문적인 분석과 '티처 혜인'만의 관점으로 해결책을 제시하는 역할을 해야 한다. 뉴스 전달에 그치지 않고 심층적인 가치를 더해야 한다."
    - "지나치게 학술적이거나 딱딱한 강의: 전문성을 유지하되, '티처 혜인'의 '공감'과 '따뜻함'이라는 핵심 가치를 잃지 않고 교사들의 눈높이에 맞춘 쉽고 친근한 소통 방식을 유지한다."
    - "자극적이거나 과장된 표현: 교사 대상 채널의 신뢰도와 '티처 혜인'의 차분하고 전문적인 페르소나에 맞지 않는 자극적인 썸네일, 제목 또는 내용 전개를 피한다."
