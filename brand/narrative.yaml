worldview:
  setting: "교사들이 현실적으로 마주하는 교육 현장의 다양한 고민과 도전을 함께 해결하고, 더 나은 교육 환경을 만들어가는 지식 공유의 장."
  tone: "따뜻하고 전문적인, 공감과 격려를 바탕으로 한 희망적이고 사려 깊은 교육 채널 톤."
  core_message: "선생님들의 교육적 고민에 깊이 공감하고 전문적인 해결책을 제시하여, 모든 선생님이 교육의 본질을 탐구하며 지속적으로 성장할 수 있도록 돕는다."
story_patterns:
  opening_hook: "영상 시작과 동시에 교사들이 흔히 겪는 구체적인 문제 상황이나 질문을 짧고 간결한 자막과 함께 제시하여 시청자의 공감과 호기심을 유발합니다. (예: '수업 시간, 학생들의 집중력이 낮아 고민이신가요?')"
  structure: "문제 제기 → 티처 혜인의 공감 및 심층 분석 → 전문적인 지식과 실제 사례를 통한 구체적인 해결책 제시 → 시청자 격려 및 긍정적인 미래 제시."
  closing: "영상에서 다룬 핵심 메시지를 간결하게 요약하고, '티처 혜인'의 캐치프레이즈('교육의 본질을 함께 탐구하며 성장해요. 모든 선생님을 응원합니다!')를 활용하여 따뜻한 격려와 함께 다음 영상에 대한 기대 또는 추가 질문을 유도하는 CTA를 포함합니다."
  recurring_elements:
    - "티처 혜인의 시그니처 오프닝 멘트: '안녕하세요, 선생님들의 든든한 동반자 티처 혜인입니다!'"
    - "핵심 정보나 해결책을 요약하는 인포그래픽 또는 정리된 자막."
    - "고민에 공감하며 따뜻하게 격려하는 티처 혜인의 표정과 제스처."
    - "영상 말미에 '티처 혜인의 성장 노트'와 같은 작은 팁이나 명언 제공."
episode_formula:
  short_form:
    duration_sec: 60
    scene_count: "3-5"
    pacing: "fast"
    hook_sec: 3
    structure_notes: |
      - 0-3초: 강력한 질문 또는 문제 상황 제시 (예: '교실 붕괴, 이대로 괜찮을까요?').
      - 4-20초: 문제에 대한 공감과 간결한 배경 설명 (예: '많은 선생님들이 겪는 현실이죠. 하지만 해결책은 있습니다.').
      - 21-45초: 하나의 핵심 솔루션 또는 팁을 명확하게 전달 (예: '이럴 땐 '긍정 강화' 전략을 써보세요.').
      - 46-55초: 솔루션 적용의 긍정적 효과와 격려 (예: '작은 변화가 큰 결과를 가져올 거예요!').
      - 56-60초: CTA (좋아요, 구독, 댓글) 및 '티처 혜인'의 응원 메시지로 마무리.
  long_form:
    duration_min: 10
    scene_count: "15-30"
    pacing: "varied"
    act_structure:
      - act: "도입 (0-2분)"
        role: "시청자의 공감대를 형성하는 강렬한 문제 제기 또는 실제 교사 사례 소개. '티처 혜인'의 따뜻하고 전문적인 채널 시작 멘트와 함께 콘텐츠의 목적을 명확히 제시."
      - act: "전개 1막: 문제 심층 분석 (2-5분)"
        role: "제기된 문제의 원인을 다각도로 분석하고, 관련 교육 이론이나 연구 결과, 통계 자료를 바탕으로 전문성을 강화. 다양한 관점에서 접근하여 문제의 본질을 파악하도록 돕습니다."
      - act: "전개 2막: 해결 전략 탐구 (5-8분)"
        role: "구체적인 해결 전략과 실천 방안을 상세히 설명. 실제 교육 현장에서 적용 가능한 팁, 성공 및 실패 사례 분석, 단계별 가이드 등을 제시하여 실용적인 정보 제공."
      - act: "클라이맥스: 핵심 해결책 제안 (8-9분)"
        role: "영상에서 다룬 내용 중 가장 중요하고 핵심적인 해결책을 요약하고 강조. '티처 혜인'의 통찰력과 전문성을 통해 시청자가 얻을 수 있는 명확한 가치를 제시."
      - act: "결론 및 CTA (9-10분)"
        role: "전체 내용을 정리하고, 긍정적인 메시지로 시청자를 격려. 추가적인 질문 유도, 구독 및 알림 설정 독려, 관련 자료 또는 다음 영상 안내 등 시청자의 참여를 유도하는 CTA로 마무리."
    retention_tactics:
      - "중간중간 '잠깐! 티처 혜인의 팁' 코너를 삽입하여 핵심 정보를 압축적으로 제공."
      - "시청자의 질문을 유도하는 팝업 질문 또는 댓글 참여 요청."
      - "애니메이션 효과나 인포그래픽을 활용하여 복잡한 정보를 시각적으로 쉽게 전달."
      - "다른 선생님들의 공감 가는 경험담이나 실제 사례를 짧은 영상 클립으로 삽입."
      - "챕터 구분 기능을 적극 활용하여 시청자가 원하는 정보에 쉽게 접근하도록 돕고 몰입감을 유지."
